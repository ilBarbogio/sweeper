<!DOCTYPE html>
<html lang="en">
<head>

  <title>DocumeSweeper</title>
  <link rel="stylesheet" href="./index.css"/>
</head>
<body>
  <template id="menu-template">
    <div class="tile" data-game="sweeper">⚑</div>
  </template>
  
  <template id="sweeper-template">
    <div class="button flag">⚑</div>
    <div class="board"></div>
    <div class="button flag">⚑</div>
  </template>

  <template id="sliding-template">
    <div class="button undo">↺</div>
    <div class="board"></div>
    <div class="button undo">↺</div>
  </template>

  <template id="picross-template">
    <div class="button buh">⚑</div>
    <div class="board"></div>
    <div class="button buh">⚑</div>
  </template>

  <template id="minihjong-template">
    <div class="board"></div>
    <div class="board"></div>
  </template>

  <div id="main-outlet"></div>
  <script src="./index.js" type="module"></script>
</body>
</html>
